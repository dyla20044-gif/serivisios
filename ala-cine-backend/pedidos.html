<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Sala Cine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #111827);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
        }
        .glass-card { background: rgba(31, 41, 55, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { background-color: #2563eb; color: white; border-color: #3b82f6; }
        .tab-inactive { background-color: #374151; color: #9ca3af; border-color: transparent; }
    </style>
</head>
<body class="p-4 pb-12">

    <div class="text-center mb-4 mt-2">
        <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Bóveda de Pedidos</h1>
    </div>

    <div class="flex space-x-2 mb-4" id="tabs-container">
        <button id="btn-alta" onclick="switchTab('alta')" class="flex-1 py-2 rounded-lg font-bold text-sm border-b-2 tab-active transition-all">
            🔥 Rápidos
        </button>
        <button id="btn-regular" onclick="switchTab('regular')" class="flex-1 py-2 rounded-lg font-bold text-sm border-b-2 tab-inactive transition-all">
            📅 Semanales
        </button>
    </div>

    <div id="loading" class="flex flex-col justify-center items-center py-10 hidden">
        <div class="loader mb-3"></div>
        <p class="text-sm text-gray-400">Conectando...</p>
    </div>

    <div id="pedidos-container">
        
        <div id="tab-alta">
            <div id="view-alta" class="grid grid-cols-2 gap-3"></div>
            <p id="empty-alta" class="text-sm text-center text-gray-500 hidden mt-4">No hay pedidos rápidos.</p>
            <button id="btn-more-alta" onclick="loadMore('alta')" class="w-full mt-4 bg-gray-800 hover:bg-gray-700 py-3 rounded-lg font-bold text-sm hidden">⬇️ Cargar más</button>
        </div>

        <div id="tab-regular" class="hidden">
            <div id="view-regular" class="grid grid-cols-2 gap-3"></div>
            <p id="empty-regular" class="text-sm text-center text-gray-500 hidden mt-4">No hay pedidos semanales.</p>
            <button id="btn-more-regular" onclick="loadMore('regular')" class="w-full mt-4 bg-gray-800 hover:bg-gray-700 py-3 rounded-lg font-bold text-sm hidden">⬇️ Cargar más</button>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();
        const botUsername = "{{BOT_USERNAME}}";

        let currentTab = 'alta';
        let pages = { alta: 0, regular: 0 };

        function switchTab(tab) {
            tg.HapticFeedback.selectionChanged();
            currentTab = tab;
            document.getElementById('btn-alta').className = tab === 'alta' ? "flex-1 py-2 rounded-lg font-bold text-sm border-b-2 tab-active transition-all" : "flex-1 py-2 rounded-lg font-bold text-sm border-b-2 tab-inactive transition-all";
            document.getElementById('btn-regular').className = tab === 'regular' ? "flex-1 py-2 rounded-lg font-bold text-sm border-b-2 tab-active transition-all" : "flex-1 py-2 rounded-lg font-bold text-sm border-b-2 tab-inactive transition-all";
            
            document.getElementById('tab-alta').style.display = tab === 'alta' ? 'block' : 'none';
            document.getElementById('tab-regular').style.display = tab === 'regular' ? 'block' : 'none';
        }

        async function fetchPedidos(type, page) {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(`/api/admin/pedidos/list?type=${type}&page=${page}`);
                const data = await res.json();
                renderCards(data, type);
                
                // Mostrar botón cargar más si vinieron 20
                document.getElementById(`btn-more-${type}`).style.display = data.length === 20 ? 'block' : 'none';
                if (page === 0 && data.length === 0) document.getElementById(`empty-${type}`).classList.remove('hidden');

            } catch(e) { tg.showAlert('Error de conexión'); }
            document.getElementById('loading').classList.add('hidden');
        }

        function renderCards(pedidos, type) {
            const container = document.getElementById(`view-${type}`);
            pedidos.forEach(p => {
                let posterUrl = p.poster_path ? (p.poster_path.startsWith('http') ? p.poster_path : `https://image.tmdb.org/t/p/w200${p.poster_path}`) : 'https://via.placeholder.com/200x300.png?text=No+Poster';
                
                let btnHtml = '';
                if (p.mediaType === 'tv') {
                    btnHtml = `<button onclick="agregarContenido('tv', '${p.tmdbId}')" class="w-full bg-blue-600 font-bold py-2 rounded-lg text-xs mt-1">➕ Agregar Serie</button>`;
                } else if (p.mediaType === 'movie') {
                    btnHtml = `<button onclick="agregarContenido('movie', '${p.tmdbId}')" class="w-full bg-emerald-600 font-bold py-2 rounded-lg text-xs mt-1">➕ Agregar Peli</button>`;
                } else {
                    btnHtml = `
                    <div class="flex gap-1 mt-1">
                        <button onclick="agregarContenido('movie', '${p.tmdbId}')" class="flex-1 bg-emerald-600 font-bold py-2 rounded-lg text-[10px]">🎬 Peli</button>
                        <button onclick="agregarContenido('tv', '${p.tmdbId}')" class="flex-1 bg-blue-600 font-bold py-2 rounded-lg text-[10px]">📺 Serie</button>
                    </div>`;
                }

                container.innerHTML += `
                    <div id="card-${p.tmdbId}" class="glass-card rounded-xl overflow-hidden flex flex-col relative">
                        <img src="${posterUrl}" class="w-full h-40 object-cover bg-gray-800">
                        <div class="absolute top-1 right-1 bg-black/80 text-yellow-400 text-[10px] px-2 py-1 rounded-full font-bold">⭐ ${p.votes || 1}</div>
                        <div class="p-2 flex flex-col flex-grow">
                            <h3 class="text-xs font-bold truncate mb-1" title="${p.title}">${p.title}</h3>
                            <p class="text-[10px] text-gray-400 mb-2">${p.mediaType === 'tv' ? '📺 Serie' : (p.mediaType === 'movie' ? '🎬 Peli' : '❓ Desconocido')}</p>
                            <div class="mt-auto">
                                ${btnHtml}
                                <button onclick="eliminarPedido('${p.tmdbId}')" class="w-full mt-1 bg-red-900/80 hover:bg-red-700 text-red-200 font-bold py-1.5 rounded-lg text-[10px]">🗑️ Eliminar BD</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function loadMore(type) { pages[type]++; fetchPedidos(type, pages[type]); }

        function agregarContenido(type, tmdbId) {
            tg.HapticFeedback.impactOccurred('medium');
            tg.openTelegramLink(`https://t.me/${botUsername}?start=req_${type}_${tmdbId}`);
            tg.close();
        }

        function eliminarPedido(tmdbId) {
            tg.showConfirm('¿Eliminar definitivamente este pedido de la Base de Datos?', function(ok) {
                if(ok) {
                    tg.HapticFeedback.notificationOccurred('success');
                    fetch(`/api/admin/pedidos/${tmdbId}`, { method: 'DELETE' })
                    .then(r => r.json())
                    .then(d => { if(d.success) document.getElementById(`card-${tmdbId}`).remove(); });
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchPedidos('alta', 0);
            fetchPedidos('regular', 0);
        });
    </script>
</body>
</html>
